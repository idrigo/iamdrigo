<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#eef3f2"/>
  <!-- sea -->
  <rect x="0" y="140" width="400" height="110" fill="#d9e6ec"/>
  <!-- bathymetry contours -->
  <g fill="none" stroke="#8fadc7" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.7">
    <path d="M0,180 C70,172 140,190 210,182 C280,174 340,190 400,183"/>
    <path d="M0,210 C80,202 150,220 230,211 C300,203 350,218 400,212"/>
    <path d="M0,238 C90,231 170,246 260,238 C320,232 370,243 400,239"/>
  </g>
  <!-- vessel -->
  <g>
    <!-- hull -->
    <path d="M84,118 L300,118 L322,140 L300,152 L104,152 L84,140 Z" fill="#24466a"/>
    <!-- deck stripe -->
    <rect x="92" y="118" width="216" height="5" fill="#8fadc7"/>
    <!-- superstructure -->
    <rect x="196" y="88" width="72" height="30" fill="#4f7aa3"/>
    <rect x="208" y="68" width="42" height="20" fill="#6b93b5"/>
    <!-- windows -->
    <g fill="#eef3f2">
      <rect x="214" y="74" width="7" height="7"/>
      <rect x="226" y="74" width="7" height="7"/>
      <rect x="238" y="74" width="7" height="7"/>
      <rect x="204" y="96" width="8" height="8"/>
      <rect x="220" y="96" width="8" height="8"/>
      <rect x="236" y="96" width="8" height="8"/>
      <rect x="252" y="96" width="8" height="8"/>
    </g>
    <!-- mast -->
    <path d="M282,118 L282,60 M272,68 L292,68" stroke="#24466a" stroke-width="3" fill="none"/>
    <!-- A-frame at stern -->
    <path d="M100,118 L118,84 L136,118" fill="none" stroke="#24466a" stroke-width="4"/>
  </g>
  <!-- CTD cable and rosette -->
  <path d="M118,84 L118,196" stroke="#24466a" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <g transform="translate(118,204)">
    <circle r="9" fill="none" stroke="#24466a" stroke-width="3"/>
    <circle r="2.5" fill="#24466a"/>
  </g>
</svg>
