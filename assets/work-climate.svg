<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#eef3f2"/>
  <!-- gridlines -->
  <g stroke="#14283a" stroke-opacity="0.1" stroke-width="1">
    <line x1="40" y1="50" x2="370" y2="50"/>
    <line x1="40" y1="100" x2="370" y2="100"/>
    <line x1="40" y1="150" x2="370" y2="150"/>
    <line x1="40" y1="200" x2="370" y2="200"/>
  </g>
  <!-- projection uncertainty band -->
  <path d="M215,142 C260,130 310,110 365,55 L365,150 C310,160 260,158 215,152 Z" fill="#d3e4e6" fill-opacity="0.85"/>
  <!-- historical anomaly line -->
  <path d="M40,185 C55,178 62,190 75,183 C90,175 98,188 112,180 C128,170 138,178 152,168 C168,158 178,166 192,155 C202,148 208,146 215,147"
        fill="none" stroke="#14283a" stroke-width="1.8"/>
  <!-- projected line -->
  <path d="M215,147 C265,138 315,105 365,62" fill="none" stroke="#c42a6e" stroke-width="1.8" stroke-dasharray="6 5"/>
  <!-- axis -->
  <line x1="40" y1="30" x2="40" y2="215" stroke="#14283a" stroke-opacity="0.45" stroke-width="1"/>
  <line x1="40" y1="215" x2="370" y2="215" stroke="#14283a" stroke-opacity="0.45" stroke-width="1"/>
  <g font-family="IBM Plex Mono, monospace" font-size="10" fill="#5e7285">
    <text x="34" y="188" text-anchor="end">0°</text>
    <text x="34" y="105" text-anchor="end">+2°</text>
    <text x="52" y="232">1980</text>
    <text x="196" y="232">2025</text>
    <text x="336" y="232">2100</text>
  </g>
</svg>
