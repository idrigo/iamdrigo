    <path d="M96,120 C130,140 160,178 220,194" fill="none" stroke="#c42a6e" stroke-width="3"/>
    <g fill="#c42a6e">
      <path d="M124,136 a7,7 0 0 1 10,8 z"/>
      <path d="M158,162 a7,7 0 0 1 10,8 z"/>
      <path d="M192,184 a7,7 0 0 1 10,8 z"/>
    </g>
  </g>
  <!-- columns -->
  <g fill="#c9d4de">
    <rect x="240" y="106" width="72" height="6" rx="2"/>
    <rect x="240" y="118" width="72" height="6" rx="2"/>
    <rect x="240" y="130" width="56" height="6" rx="2"/>
    <rect x="240" y="150" width="72" height="6" rx="2"/>
    <rect x="240" y="162" width="72" height="6" rx="2"/>
    <rect x="240" y="174" width="64" height="6" rx="2"/>
    <rect x="240" y="194" width="72" height="6" rx="2"/>
  </g>
  <g fill="#dde5ec">
    <rect x="88" y="214" width="224" height="6" rx="2"/>
    <rect x="88" y="226" width="188" height="6" rx="2"/>
    <rect x="88" y="238" width="204" height="6" rx="2"/>
  </g>
